name: Tests

on:
  push:
  pull_request:

jobs:
  docker-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t qa-response-classifier .

      - name: Run unit tests in Docker
        run: docker run --rm qa-response-classifier

      - name: Run integration tests in Docker
        run: docker run --rm qa-response-classifier pytest -m integration