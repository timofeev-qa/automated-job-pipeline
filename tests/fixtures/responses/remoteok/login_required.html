<title>RemoteOK Login</title>

<main id="authentication-flow">
    <h1>Log in</h1>

    <form>
        <label class="username_or_email">
            Enter username or email
        </label>

        <button class="action-login">
            Log in with username or email
        </button>

        <button class="login-with-google">
            Continue with Google
        </button>
    </form>

    <footer>
        <a href="/sign-up">
            Do not have an account? Sign up
        </a>
    </footer>
</main>
